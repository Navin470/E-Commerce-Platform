<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title -->
    <title>E-Commerce Platform</title>

    <!-- Google Fonts (Modern UI look) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <!-- Meta for SEO -->
    <meta name="description" content="Modern E-Commerce Platform built with React, Flask & Microservices" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#0f172a" />

    <!-- Smooth UI base styling -->
    <style>
      body {
        margin: 0;
        font-family: 'Inter', 'Poppins', system-ui, -apple-system, sans-serif;
        background-color: #0f172a; /* dark slate */
        color: #f8fafc;
      }

      /* Loading screen */
      #loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0f172a;
        z-index: 9999;
      }

      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #334155;
        border-top: 4px solid #38bdf8;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>

  <body>
    <!-- Loading Screen -->
    <div id="loader">
      <div class="spinner"></div>
    </div>

    <!-- React Root -->
    <div id="root"></div>

    <!-- Script -->
    <script type="module" src="/src/main.jsx"></script>

    <!-- Remove loader after app loads -->
    <script>
      window.addEventListener("load", () => {
        const loader = document.getElementById("loader");
        if (loader) loader.style.display = "none";
      });
    </script>
  </body>
</html>
