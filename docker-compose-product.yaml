service:  
  product-service:
    build: ./service/product-service
    ports:
      - "5004:5004"
    depends_on:
      - product-db
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@product-db:5432/product_db

  product-db:
    image: postgres:15
    environment:
      POSTGRES_DB: product_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"